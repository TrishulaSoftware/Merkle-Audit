name: SOVEREIGN_SYNC [TSW-v1]

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SET_UP_SOVEREIGN_PYTHON
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: INSTALL_CORE_FORGE
        run: pip install cython requests numpy psutil
      - name: CYTHON_HARDENING [AOT]
        run: python setup.py build_ext --inplace
      - name: DETERMINISTIC_AUDIT
        run: |
          python -c "import time; t=time.time(); print(f'HEARTBEAT_STATUS: {time.time()-t:.6f}s')"
          export TARGET_CORE=$(ls *.py | grep -v setup.py | head -n 1)
          python $TARGET_CORE
      - name: SOVEREIGN_TELEMETRY
        if: always()
        run: echo "$(date) | BUILD_SUCCESS | STATUS: ARMORED" >> telemetry/build_audit.log
